        function loadScript(src) {

                s.onload = resolve;
                s.onerror = reject;

        let chatLoading = false;

        window.handleSend = function() {

        let formLoading = false;

            if (window.auditForm) {

        };

            if (window.auditForm) {
                window.auditForm.close();
            }
        };
        
        // Lazy-load chatbot after 10s delay to keep initial load completely clean
        setTimeout(() => {
